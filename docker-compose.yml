version: '3.8'

services:
  # 1. Database Service (MongoDB)
  mongodb:
    image: mongo:6.0
    container_name: backend-mongodb
    environment:
      MONGO_INITDB_ROOT_USERNAME: myuser
      MONGO_INITDB_ROOT_PASSWORD: mypassword
      MONGO_INITDB_DATABASE: mydb
    ports:
      - "27017:27017"
    volumes:
      - mongodata:/data/db

  # 2. Spring Boot Backend Service
  backend:
    build: ./your-spring-boot-folder-name
    container_name: spring-backend
    ports:
      - "8080:8080"
    environment:
      # Spring Boot automatically picks up this URI format for MongoDB
      - SPRING_DATA_MONGODB_URI=mongodb://myuser:mypassword@mongodb:27017/mydb?authSource=admin
    depends_on:
      - mongodb

  # 3. Angular Back Office Service
  back-office:
    build: ./your-angular-folder-name
    container_name: angular-backoffice
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  mongodata:
