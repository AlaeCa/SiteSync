<div *ngIf="loading" style="text-align:center; padding: 40px;">
  <mat-spinner diameter="50" style="margin: auto;"></mat-spinner>
</div>

<mat-card *ngIf="!loading && user" style="background: #16213e; color: white; max-width: 600px; margin: auto; border-radius: 16px; border: 1px solid #0f3460;">
  <mat-card-header>
    <div mat-card-avatar style="background:#ff6b35; border-radius:50%; width:50px; height:50px; display:flex; align-items:center; justify-content:center; font-size:22px; font-weight:bold; color:white;">
      {{ user.name.charAt(0).toUpperCase() }}
    </div>
    <mat-card-title style="color:white;">{{ user.name }}</mat-card-title>
    <mat-card-subtitle style="color:#aaa;">{{ user.email }}</mat-card-subtitle>
  </mat-card-header>

  <mat-card-content style="padding: 20px;">
    <p><strong style="color:#ff6b35;">Téléphone :</strong> <span style="color:white;">{{ user.phone || 'Non renseigné' }}</span></p>
    <p><strong style="color:#ff6b35;">Statut :</strong>
      <span [style.color]="user.status === 'ACTIVE' ? '#2ecc71' : '#e74c3c'">{{ user.status }}</span>
    </p>
    <p><strong style="color:#ff6b35;">Membre depuis :</strong> <span style="color:white;">{{ user.createdAt | date:'dd/MM/yyyy' }}</span></p>

    <div style="margin-top: 20px;">
      <strong style="color:#ff6b35;">Changer le rôle :</strong>
      <mat-select [(value)]="user.role" (selectionChange)="changeRole($event.value)" style="color:white; margin-left: 16px; width: 120px;">
        
        <mat-option value="CHEF">CHEF</mat-option>
        <mat-option value="ADMIN">ADMIN</mat-option>
      </mat-select>
    </div>
  </mat-card-content>

  <mat-card-actions style="padding: 16px;">
    <button mat-raised-button [color]="user.status === 'ACTIVE' ? 'warn' : 'primary'" (click)="toggleStatus()">
      {{ user.status === 'ACTIVE' ? '🚫 Suspendre' : '✅ Activer' }}
    </button>
    <button mat-button style="color:#aaa; margin-left:8px;" (click)="goBack()">← Retour</button>
  </mat-card-actions>
</mat-card>
